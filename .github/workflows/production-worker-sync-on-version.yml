name: Sync Production Worker on Version Tag Change

on:
  push:
    branches: [ "main" ]
    paths:
      - src/workers/servicesWorker.js

permissions:
  contents: write

jobs:
  sync_production_worker:
    name: Merge main into production-worker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check services worker version tag change
        id: version_tag
        shell: bash
        run: |
          set -e
          file="src/workers/servicesWorker.js"
          current=$(head -n 1 "$file")
          echo "current=$current" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "previous=none" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          previous=$(git show ${{ github.event.before }}:$file 2>/dev/null | head -n 1 || true)
          if [ -z "$previous" ]; then
            echo "previous=missing" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "previous=$previous" >> "$GITHUB_OUTPUT"
          if [ "$current" != "$previous" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Git config
        if: ${{ steps.version_tag.outputs.changed == 'true' }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Pull latest production-worker
        if: ${{ steps.version_tag.outputs.changed == 'true' }}
        run: |
          git fetch origin production-worker || echo "production-worker does not exist yet"

      - name: Merge main into production-worker
        if: ${{ steps.version_tag.outputs.changed == 'true' }}
        run: |
          git checkout production-worker || git checkout -b production-worker
          if git merge main --no-ff -m "Auto deploy main -> production-worker"; then
            echo "Normal merge completed."
          else
            echo "Retrying merge with unrelated histories..."
            git merge main --no-ff --allow-unrelated-histories -m "Initial production-worker merge"
          fi

      - name: Push to production-worker
        if: ${{ steps.version_tag.outputs.changed == 'true' }}
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push https://x-access-token:${TOKEN}@github.com/${{ github.repository }} production-worker
