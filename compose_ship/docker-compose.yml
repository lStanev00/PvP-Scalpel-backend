volumes:
    pvp_s_redis:
        driver: local
        driver_opts:
            type: none
            o: bind
            device: /home/lych/production-apps/pvp-scalpel/volume/redis
    pvp_s_redisinsight:
networks:
    pvp_scalpel_net:
        name: pvp_scalpel_net
        driver: bridge
